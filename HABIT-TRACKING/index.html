<!DOCTYPE html>
<html lang="en">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>HabitTracking</title>
    <link rel="stylesheet" href="styles.css">
    <script src="habit.js" defer></script>
</head>
<body>
    

    
    <div class="hForm">
        <h2 id="main-heading">HABIT TRACKER</h2>
        <p>Add New Habit</p>
        <form id="habitForm">
            <label for="TargetName">Target name: </label>
            <input type="text" id="fname" name="fname"  placeholder="target name.(e.g studying)"><br>

            <label for="target">Target: </label>
            <input type="number" id="target" name="target" placeholder="number of days or weeks"><br>

            <label for="category">Habit: </label>
            <select id="category" name="category">
                <option value="">Choose a category</option>
                <option value="Study">Study</option>
                <option value="Fitness">Fitness</option>
                <option value="Health">Health</option>
                <option value="Work">Work</option>
            
            </select><br>

            <button type="submit">Add Habit</button>
        </form>
    </div>
    <div id="summary"></div>
    <ul id="habitList"></ul>

    <div class="errorMessage">
        <p class="errorMessage" id="paragraph"></p>
    </div>
</body>
</html>
